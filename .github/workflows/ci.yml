name: CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  backend-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src-claude-plus/backend/hissp-distribution
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Build Backend
        run: mvn -q clean package -DskipTests

  admin-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src-claude-plus/frontend/yudao-ui-admin-vue3
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: npm
          cache-dependency-path: src-claude-plus/frontend/yudao-ui-admin-vue3/package-lock.json

      - name: Install Dependencies
        run: npm ci

      - name: Build Admin Frontend
        run: npm run build

  mall-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src-claude-plus/frontend/distribution-mall-mini-vue3
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Install Dependencies
        run: npm install

      - name: Build Mall H5
        run: npm run build:h5
