--- #################### 芋道相关配置 ####################

# 芋道配置项，设置当前项目所有自定义的配置
distribution:
  captcha:
    enable: false # 本地环境，暂时关闭图片验证码，方便登录等接口的测试；
  security:
    mock-enable: true
  pay:
    order-notify-url: https://api.example.com/admin-api/pay/notify/order # 支付渠道的【支付】回调地址
    refund-notify-url: https://api.example.com/admin-api/pay/notify/refund # 支付渠道的【退款】回调地址
    transfer-notify-url: https://api.example.com/admin-api/pay/notify/transfer # 支付渠道的【转账】回调地址
    default-account-app-key: mall
    account-declaration-notify-url: https://api.example.com/admin-api/pay/notify/account-declaration # 账户服务入网回调地址
  trade:
    order:
      admin-refund-password: "" # 为空表示不校验退款口令
      withdraw-transfer-channel-code: payease_account # 渠道打款默认走首信易账户服务
  mb:
    order:
      admin-refund-password: "" # 为空表示不校验退款口令
  access-log: # 访问日志的配置项
    enable: false
  demo: false # 关闭演示模式
  wxa-code:
    env-version: develop # 小程序版本: 正式版为 "release"；体验版为 "trial"；开发版为 "develop"
  wxa-subscribe-message:
    miniprogram-state: developer # 跳转小程序类型：开发版为 “developer”；体验版为 “trial”为；正式版为 “formal”
  tencent-lbs-key: CHANGE_ME_TENCENT_LBS_KEY # QQ 地图的密钥 https://lbs.qq.com/service/staticV2/staticGuide/staticDoc

justauth:
  enabled: true
  type:
    DINGTALK: # 钉钉
      client-id: CHANGE_ME_DING_CLIENT_ID
      client-secret: CHANGE_ME_DING_CLIENT_SECRET
      ignore-check-redirect-uri: true
    WECHAT_ENTERPRISE: # 企业微信
      client-id: CHANGE_ME_WECOM_CLIENT_ID
      client-secret: CHANGE_ME_WECOM_CLIENT_SECRET
      agent-id: 1000004
      ignore-check-redirect-uri: true
    # noinspection SpringBootApplicationYaml
    WECHAT_MINI_APP: # 微信小程序
      client-id: ${wx.miniapp.appid}
      client-secret: ${wx.miniapp.secret}
      ignore-check-redirect-uri: true
      ignore-check-state: true # 微信小程序，不会使用到 state，所以不进行校验
    WECHAT_MP: # 微信公众号
      client-id: ${wx.mp.app-id}
      client-secret: ${wx.mp.secret}
      ignore-check-redirect-uri: true
  cache:
    type: REDIS
    prefix: 'social_auth_state:' # 缓存前缀，目前只对 Redis 缓存生效，默认 JUSTAUTH::STATE::
    timeout: 24h # 超时时长，目前只对 Redis 缓存生效，默认 3 分钟

