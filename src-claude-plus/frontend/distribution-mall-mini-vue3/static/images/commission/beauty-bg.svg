<?xml version="1.0" encoding="UTF-8"?>
<svg width="750" height="400" viewBox="0 0 750 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFE4E1;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#FFF0F5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E6E6FA;stop-opacity:1" />
    </linearGradient>
    <filter id="blur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="30" />
    </filter>
  </defs>
  
  <!-- 背景渐变 -->
  <rect width="750" height="400" fill="url(#grad1)"/>
  
  <!-- 装饰圆形 -->
  <circle cx="100" cy="100" r="160" fill="#FFF5E6" opacity="0.1" filter="url(#blur)"/>
  <circle cx="650" cy="300" r="120" fill="#FFE4E1" opacity="0.1" filter="url(#blur)"/>
  
  <!-- 装饰线条 -->
  <path d="M0 200 Q 375 150, 750 200" stroke="#FFF" stroke-width="1" opacity="0.1"/>
  <path d="M0 250 Q 375 200, 750 250" stroke="#FFF" stroke-width="1" opacity="0.1"/>
</svg> 